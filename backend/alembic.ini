# Exam OS — Alembic / Flask-Migrate configuration
# Prefer:  flask db migrate | upgrade | downgrade
# The real DB URL is injected at runtime from Flask app config
# (see migrations/env.py). The sqlalchemy.url below is a local fallback only.

[alembic]
script_location = migrations
prepend_sys_path = .
version_path_separator = os

# Fallback only — env.py overwrites this from SQLALCHEMY_DATABASE_URI
sqlalchemy.url = sqlite:///exam_os.db

# Truncate long revision file names
# truncate_slug_length = 40

# timezone = UTC

[post_write_hooks]
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -q

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
